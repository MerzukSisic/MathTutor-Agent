services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: mathtutor-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD:?Set DB_SA_PASSWORD in .env}"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: AiAgents.MathTutorAgent.Web/Dockerfile
    container_name: mathtutor-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      DatabaseProvider: "SqlServer"
      App__PublicBaseUrl: "http://localhost:${APP_PORT:-5297}"
      ConnectionStrings__SqlServerConnection: "Server=db,1433;Database=${DB_NAME:-MathTutorAgentDb1};User Id=sa;Password=${DB_SA_PASSWORD:?Set DB_SA_PASSWORD in .env};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
    ports:
      - "${APP_PORT:-5297}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped

volumes:
  sqlserver_data:
  app_logs:
