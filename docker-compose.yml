services:
  db:
    image: postgres:16
    container_name: mathtutor-db
    environment:
      POSTGRES_DB: ${DB_NAME:-mathtutor}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: AiAgents.MathTutorAgent.Web/Dockerfile
    container_name: mathtutor-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      App__PublicBaseUrl: "http://localhost:${APP_PORT:-5297}"
      ConnectionStrings__PostgresConnection: "Host=db;Port=5432;Database=${DB_NAME:-mathtutor};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:?Set DB_PASSWORD in .env};Pooling=true;Maximum Pool Size=20"
    ports:
      - "${APP_PORT:-5297}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  app_logs:
