name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: AiAgents.MathTutor.sln

permissions:
  contents: read
  checks: write

jobs:
  format:
    name: 🎨 Format check (dotnet format)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore tools
        run: dotnet tool restore || true

      - name: Verify format (non-blocking for now)
        continue-on-error: true
        run: |
          dotnet format ${{ env.SOLUTION_PATH }} --verify-no-changes --verbosity minimal \
            --report ./format-report.json || (echo "::error::Run 'dotnet format' locally and commit changes." && exit 1)

      - name: Format status note
        if: always()
        run: echo "Format check trenutno je warning-only da ne blokira CI dok ne sredimo postojeći legacy formatting."

      - name: Upload format report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: format-report
          path: ./format-report.json
          retention-days: 7

  build-test:
    name: 🔨 Build, Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: format

    env:
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }} --locked-mode || dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build (Release)
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install --global dotnet-reportgenerator-globaltool || true

      - name: Generate coverage report
        if: always()
        run: |
          if [ -n "$(find ./TestResults -type f -name 'coverage.cobertura.xml' -print -quit)" ]; then
            reportgenerator \
              -reports:"./TestResults/**/coverage.cobertura.xml" \
              -targetdir:"./CoverageReport" \
              -reporttypes:"HtmlInline;Cobertura;MarkdownSummaryGithub" \
              -title:"MathTutor Coverage"
          else
            echo "No coverage.cobertura.xml generated; skipping report generation."
          fi

      - name: Publish coverage summary to PR
        if: always()
        run: |
          if [ -f "./CoverageReport/SummaryGithub.md" ]; then
            cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          if-no-files-found: warn
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload to Codecov
        if: ${{ always() && secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: ./CoverageReport/Cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  codeql:
    name: 🔒 CodeQL Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: format
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [csharp]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Restore + Build for CodeQL
        run: |
          dotnet restore ${{ env.SOLUTION_PATH }}
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-restore \
            /p:UseSharedCompilation=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  dependencies:
    name: 🛡️ Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: format

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Audit for vulnerable packages
        run: |
          OUTPUT=$(dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "Severity: (High|Critical)"; then
            echo "::error::Found HIGH or CRITICAL vulnerabilities in NuGet packages"
            exit 1
          elif echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::warning::Found vulnerable packages (Low/Moderate). Review and update."
          fi

      - name: Check for deprecated packages
        run: dotnet list ${{ env.SOLUTION_PATH }} package --deprecated || true

      - name: Check for outdated packages (informational)
        run: dotnet list ${{ env.SOLUTION_PATH }} package --outdated || true

  ci-gate:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs: [format, build-test, codeql, dependencies]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.build-test.result }}" != "success" ]] || \
             [[ "${{ needs.codeql.result }}" != "success" ]] || \
             [[ "${{ needs.dependencies.result }}" != "success" ]]; then
            echo "::error::One or more required CI checks failed"
            echo "format:       ${{ needs.format.result }}"
            echo "build-test:   ${{ needs.build-test.result }}"
            echo "codeql:       ${{ needs.codeql.result }}"
            echo "dependencies: ${{ needs.dependencies.result }}"
            exit 1
          fi

          echo "All required CI checks passed ✅"
