name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore AiAgents.MathTutor.sln

      - name: Build
        run: dotnet build AiAgents.MathTutor.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AiAgents.MathTutor.sln --configuration Release --no-build --verbosity normal
